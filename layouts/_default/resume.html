<!DOCTYPE html>
<html lang="{{ site.Language }}" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} | {{ site.Title }}</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <iframe
    src="{{ (strings.TrimPrefix "/" (.Params.pdf | default "pdf/Harsh_Thomare_resume-2.pdf")) | absURL }}"
    title="{{ .Title }}"
  ></iframe>
</body>
</html>
